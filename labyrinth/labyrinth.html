      let brightness = (r * 299 + g * 587 + b * 114) / 1000;

      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      const targetLeft = Math.max(0, centerX - window.innerWidth / 2);
      const targetTop = Math.max(0, centerY - window.innerHeight / 2);

      window.scrollTo({
        left: targetLeft,
        top: targetTop,
        behavior: "auto"

      while (places.length > 1 && newIndex === lastPlaceIndex) {
        newIndex = Math.floor(Math.random() * places.length);
      }

      const spot = places[newIndex];
      const movedSomewhereNew = newIndex !== lastPlaceIndex;
      lastPlaceIndex = newIndex;

      window.scrollTo({
        left: spot[0],
        top: spot[1],
        behavior: "smooth"
      });

      if (movedSomewhereNew) {

      }

      }

      applyTextColor(document.body.style.color);
      goSomewhere();
    }

    function smallChange(id) {
      if (isInterrupted) return;

      if (!hasScattered) {
        scatterFromCenterFirstTime();
        return;
      }

      let bg = getRandomColor();
      let textColor = getTextColor(bg);

      document.body.style.background = bg;
      document.body.style.color = textColor;
      applyTextColor(textColor);

      document.getElementById(id).innerHTML = getRandomLine();
    }

    function startInterruptionTimer() {
      clearTimeout(interruptionTimer);
      interruptionTimer = setTimeout(triggerInterruption, INTERRUPTION_TIME);
    }

    function triggerInterruption() {
      isInterrupted = true;

      siteBlank.style.display = "block";
      leavePopup.style.display = "flex";
      loadingScreen.style.display = "none";
      leaveInput.value = "";

      scene.style.visibility = "hidden";
      progressWrap.style.visibility = "hidden";
      document.body.style.overflow = "hidden";

      leaveInput.focus();
    }

    function startLoadingAnimation() {
      let frames = [".", "..", "..."];
      let index = 0;

      loadingDots.textContent = frames[index];

      clearInterval(loadingDotTimer);
      loadingDotTimer = setInterval(() => {
        index = (index + 1) % frames.length;
        loadingDots.textContent = frames[index];
      }, 400);
    }

    function stopLoadingAnimation() {
      clearInterval(loadingDotTimer);
      loadingDotTimer = null;
      loadingDots.textContent = "...";
    }

    function resumeSiteWithLeftover(userText) {
      leaveBehindText(userText);

      scene.style.visibility = "visible";
      progressWrap.style.visibility = "visible";
      siteBlank.style.display = "none";
      loadingScreen.style.display = "none";
      document.body.style.overflow = "auto";

      isInterrupted = false;
      startInterruptionTimer();
    }

    leaveSubmit.addEventListener("click", function() {
      const userText = leaveInput.value.trim();

      leavePopup.style.display = "none";
      loadingScreen.style.display = "flex";
      startLoadingAnimation();

      setTimeout(() => {
        stopLoadingAnimation();

        if (!hasScattered) {
          buildCenteredCluster();
          resetProgressToEmpty();
        } else {
          if (state === 0) {
            document.body.style.background = "white";
            document.body.style.color = "black";
            showSet(positions1);
            state = 1;
          } else if (state === 1) {
            document.body.style.background = "black";
            document.body.style.color = "white";
            showSet(positions2);
            state = 2;
          } else {
            document.body.style.background = "white";
            document.body.style.color = "black";
            showSet(positions3);
            state = 0;
          }
          applyTextColor(document.body.style.color);
        }

        resumeSiteWithLeftover(userText);
      }, RELOAD_TIME);
    });

    for (let i = 0; i < bigChangeIds.length; i++) {
      document.getElementById(bigChangeIds[i]).onclick = changeScene;
    }

    for (let i = 0; i < smallChangeIds.length; i++) {
      let id = smallChangeIds[i];
      document.getElementById(id).onclick = function() {
        smallChange(id);
      };
    }

    document.body.style.background = "white";
    document.body.style.color = "black";
    buildCenteredCluster();
    resetProgressToEmpty();
    startInterruptionTimer();

    window.addEventListener("resize", function() {
      if (!hasScattered && !isInterrupted) {
        buildCenteredCluster();
        resetProgressToEmpty();
      }
    });
  </script>
</body>
</html>
